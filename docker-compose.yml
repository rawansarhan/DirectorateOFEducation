version: "3.9"

services:
  api:
    build: .
    container_name: net_app_api
    ports:
      - "4000:4000"
    environment:
      PORT: 4000

      # ===== Database =====
      DB_HOST: db
      DB_NAME: Net_App
      DB_USER: postgres
      DB_PASSWORD: "5426229"
      DB_PORT: 5432

      # ===== Auth =====
      JWT_SECRET: your_very_secret_key

      # ===== Email (OTP - Gmail) =====
      EMAIL_USER: raneemmahmoud333@gmail.com
      EMAIL_PASS: hsifaevygxjjdauy

      # ===== Cloudinary =====
      CLOUDINARY_CLOUD_NAME: drwcnitdh
      CLOUDINARY_API_KEY: 911345844397137
      CLOUDINARY_API_SECRET: onVqqSzLNGGoK4msrcMMwJuuyHI

    depends_on:
      db:
        condition: service_healthy
    restart: always

  db:
    image: postgres:15
    container_name: net_app_db
    ports:
      - "5000:5432"
    environment:
      POSTGRES_DB: Net_App
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "5426229"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
